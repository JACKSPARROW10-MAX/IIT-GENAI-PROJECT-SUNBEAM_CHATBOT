name: Weekly Data Scraping & RAG Update

on:
  schedule:
    - cron: "30 0 * * 0"   # Every Sunday 6:00 AM IST
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      # 🔹 1. Free disk space (VERY IMPORTANT)
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo apt-get clean
          df -h

      # 🔹 2. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔹 3. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 🔹 4. Install dependencies (NO CACHE)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      # 🔹 5. Verify secrets (safe check)
      - name: Verify secrets
        run: |
          python - <<EOF
          import os
          print("CHROMA_API_KEY:", bool(os.getenv("CHROMA_API_KEY")))
          print("LLM_API_KEY:", bool(os.getenv("LLM_API_KEY")))
          EOF
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          LLM_API_KEY: ${{ secrets.NEW_GROQ_KEY }}

      # 🔹 6. Run ingestion pipeline
      - name: Run ingestion pipeline
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.TENANT_ID }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          LLM_API_KEY: ${{ secrets.NEW_GROQ_KEY }}
        run: |
          python scripts/About_us_sc.py
          python scripts/Course_scrap.py
          python scripts/Internship_sc.py
          python scripts/PreCAT_sc.py
          python scripts/data_to_chroma.py
